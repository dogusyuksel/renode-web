name: pr-workflow

concurrency:
    group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
    cancel-in-progress: true

on:
  pull_request:
  workflow_dispatch:

jobs:
  pr-workflow-job:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        github-server-url: https://github.com/dogusyuksel/renode-web.git
        lfs: true

    - name: executions
      run: |
        ./setup_env.sh
        ./docker_ctl.sh -b -s -c "cd /workspace && renode uploads/example.resc && python3 report_creator.py --connections uploads/structure.json --diagram uploads/diagram.png --log uploads/log.txt --out uploads/report.pdf"

    - name: Upload artifacts
      uses: actions/upload-artifact@v6
      with:
        name: uploads
        path: uploads
